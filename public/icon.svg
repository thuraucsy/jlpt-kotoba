<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <rect width="512" height="512" rx="96" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <!-- Decorative accent bar -->
  <rect x="0" y="400" width="512" height="8" rx="4" fill="#e94560" opacity="0.8"/>
  <!-- 言 character -->
  <text x="256" y="300" font-family="'Hiragino Sans','Noto Sans JP','Yu Gothic',sans-serif"
        font-size="260" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">言</text>
  <!-- Small label -->
  <text x="256" y="460" font-family="'Segoe UI','Helvetica Neue',sans-serif"
        font-size="52" font-weight="600" fill="#e94560" text-anchor="middle" letter-spacing="6">KOTOBA</text>
</svg>
