<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="bookGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Book base -->
  <rect x="96" y="270" width="320" height="180" rx="14" fill="url(#bookGrad)"/>
  <!-- Book spine -->
  <rect x="96" y="270" width="22" height="180" rx="8" fill="#c23152"/>
  <!-- Book pages (right side) -->
  <rect x="118" y="278" width="290" height="164" rx="6" fill="#fff5f5" opacity="0.97"/>
  <!-- Page lines -->
  <rect x="148" y="308" width="200" height="8" rx="4" fill="#e94560" opacity="0.25"/>
  <rect x="148" y="328" width="180" height="7" rx="3.5" fill="#1a1a2e" opacity="0.12"/>
  <rect x="148" y="347" width="190" height="7" rx="3.5" fill="#1a1a2e" opacity="0.12"/>
  <rect x="148" y="366" width="160" height="7" rx="3.5" fill="#1a1a2e" opacity="0.12"/>
  <rect x="148" y="385" width="175" height="7" rx="3.5" fill="#1a1a2e" opacity="0.12"/>
  <rect x="148" y="404" width="140" height="7" rx="3.5" fill="#1a1a2e" opacity="0.12"/>

  <!-- Tree trunk -->
  <rect x="236" y="210" width="40" height="80" rx="8" fill="#8b5e3c"/>
  <!-- Tree canopy layers -->
  <polygon points="256,58 176,190 336,190" fill="#2e7d32" opacity="0.95"/>
  <polygon points="256,95 188,205 324,205" fill="#388e3c"/>
  <polygon points="256,128 200,222 312,222" fill="#43a047"/>
  <!-- Tree highlight -->
  <polygon points="256,70 225,150 256,140" fill="#4caf50" opacity="0.4"/>

  <!-- Bottom label -->
  <rect x="0" y="468" width="512" height="44" rx="0" fill="#e94560" opacity="0.0"/>
  <text x="256" y="496" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="38" font-weight="700" fill="white" text-anchor="middle"
        letter-spacing="2">JLPT Kotoba</text>
</svg>
